<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;background:transparent;width:1024px;height:1024px;overflow:hidden}
</style></head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101a30"/>
      <stop offset="1" stop-color="#070b16"/>
    </linearGradient>
    <linearGradient id="slide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16233c"/>
      <stop offset="1" stop-color="#0e1729"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4F8EF7"/>
      <stop offset="1" stop-color="#4F8EF7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- macOS squircle plate -->
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="186" fill="none"
        stroke="#4F8EF7" stroke-opacity=".25" stroke-width="6"/>
  <!-- faint grid, like the decks' background -->
  <g stroke="#4F8EF7" stroke-opacity=".07" stroke-width="3">
    <path d="M100 306h824M100 512h824M100 718h824"/>
    <path d="M306 100v824M512 100v824M718 100v824"/>
  </g>

  <!-- back slides of the stack -->
  <rect x="286" y="216" width="536" height="336" rx="34" fill="#0c1424" stroke="#2b3f63" stroke-width="5" transform="rotate(4 554 384)" opacity=".72"/>
  <rect x="252" y="248" width="536" height="336" rx="34" fill="#101b30" stroke="#334970" stroke-width="5" transform="rotate(2 520 416)" opacity=".88"/>

  <!-- front slide -->
  <g>
    <rect x="216" y="286" width="536" height="336" rx="34" fill="url(#slide)" stroke="#4F8EF7" stroke-opacity=".8" stroke-width="6"/>
    <rect x="216" y="286" width="536" height="18" rx="9" fill="url(#accent)"/>
    <!-- kicker -->
    <rect x="266" y="352" width="128" height="16" rx="8" fill="#4F8EF7" opacity=".85"/>
    <!-- title bars -->
    <rect x="266" y="404" width="290" height="42" rx="12" fill="#f4f7ff"/>
    <rect x="266" y="462" width="212" height="42" rx="12" fill="#f4f7ff" opacity=".92"/>
    <!-- body line -->
    <rect x="266" y="540" width="240" height="16" rx="8" fill="#8fa6c9" opacity=".55"/>
    <!-- concentric target motif -->
    <circle cx="640" cy="470" r="78" fill="none" stroke="#2e4a78" stroke-width="10"/>
    <circle cx="640" cy="470" r="52" fill="none" stroke="#2D9B8A" stroke-width="12"/>
    <circle cx="640" cy="470" r="24" fill="#F2A93B"/>
  </g>

  <!-- presenter/play affordance -->
  <g>
    <circle cx="512" cy="726" r="96" fill="#4F8EF7"/>
    <circle cx="512" cy="726" r="96" fill="none" stroke="#0a0e1a" stroke-opacity=".35" stroke-width="4"/>
    <path d="M482 678 566 726 482 774 Z" fill="#06101f"/>
  </g>
</svg>
</body></html>
