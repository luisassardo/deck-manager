<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deck Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0A0E1A; --blue:#4F8EF7; --grn:#10B981; --amb:#F59E0B; --red:#F43F5E; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  body::before { content:''; position: fixed; inset: 0; pointer-events: none;
    background: linear-gradient(rgba(79,142,247,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,.04) 1px, transparent 1px);
    background-size: 80px 80px; }
  header { display: flex; align-items: center; justify-content: space-between;
    padding: 36px 48px 28px; border-bottom: 1px solid rgba(79,142,247,.15); position: relative; }
  header::before { content:''; position: absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, var(--blue), transparent); }
  h1 { font-family: 'Syne', sans-serif; font-size: 34px; font-weight: 800; letter-spacing: -1px; }
  .sub { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(79,142,247,.7); margin-top: 6px; }
  .btn { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 1px;
    padding: 10px 20px; border-radius: 6px; border: 1px solid rgba(79,142,247,.4);
    background: rgba(79,142,247,.1); color: #fff; cursor: pointer; }
  .btn:hover { background: rgba(79,142,247,.22); }
  .btn.primary { background: var(--blue); border-color: var(--blue); color: #06101f; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.1); }
  main { padding: 40px 48px; position: relative; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; }
  .ghead { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase; color: rgba(79,142,247,.85);
    margin: 44px 0 18px; padding-bottom: 10px; border-bottom: 1px solid rgba(79,142,247,.15);
    display: flex; align-items: center; gap: 10px; }
  .ghead::before { content: '▸'; color: rgba(79,142,247,.5); }
  #groups > .grid:first-child { margin-top: 0; }
  #groups > .grid { margin-bottom: 8px; min-height: 30px; border-radius: 12px; }
  /* Drag & drop */
  .card[draggable="true"] { cursor: grab; }
  .card.dragging { opacity: .45; }
  .ghead.drop-hint { color: #fff; border-bottom-color: var(--blue); background: rgba(79,142,247,.12); border-radius: 6px; }
  .grid.drop-hint { outline: 2px dashed rgba(79,142,247,.6); outline-offset: 8px; }
  #dropnew { display: none; position: fixed; left: 50%; transform: translateX(-50%); bottom: 22px;
    z-index: 60; padding: 16px 26px; border-radius: 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; letter-spacing: .5px; color: rgba(255,255,255,.85);
    background: rgba(10,14,26,.95); border: 1.5px dashed rgba(79,142,247,.6); }
  body.dm-dragging #dropnew { display: block; }
  #dropnew.drop-hint { border-color: var(--grn); color: #fff; background: rgba(16,185,129,.15); }
  #groups > .grid:empty { display: none; }
  body.dm-dragging #groups > .grid:empty { display: block; min-height: 56px;
    outline: 1.5px dashed rgba(79,142,247,.35); outline-offset: -1px; }
  body.dm-dragging #groups > .grid:empty::before { content: 'Top level — drop here';
    display: block; padding: 18px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 1px; color: rgba(79,142,247,.6); }
  /* Hidden section */
  .ghead.hid-head { color: rgba(245,158,11,.85); border-bottom-color: rgba(245,158,11,.2); cursor: pointer; user-select: none; }
  .ghead.hid-head::before { content: '⌀'; color: rgba(245,158,11,.5); }
  .hid-grid .card { opacity: .75; }
  .card { background: rgba(79,142,247,.04); border: 1px solid rgba(79,142,247,.18);
    border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .card:hover { border-color: rgba(79,142,247,.45); }
  .thumb { position: relative; aspect-ratio: 16/9; background: #000; overflow: hidden; cursor: pointer; }
  .thumb iframe { width: 1920px; height: 1080px; border: 0; transform-origin: 0 0; pointer-events: none; background: #000; }
  .thumb .veil { position: absolute; inset: 0; }
  .meta { padding: 18px 20px 8px; }
  .title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
  .info { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px;
    color: rgba(255,255,255,.4); margin-top: 6px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; margin-left: 8px;
    background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.4); color: var(--amb); }
  .badge.ext { background: rgba(167,139,250,.12); border-color: rgba(167,139,250,.45); color: #A78BFA; }
  .actions { display: flex; gap: 8px; padding: 14px 20px 18px; flex-wrap: wrap; }
  .act { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; letter-spacing: .5px;
    padding: 7px 13px; border-radius: 5px; border: 1px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.04); color: rgba(255,255,255,.75); cursor: pointer; }
  .act:hover { border-color: rgba(79,142,247,.6); color: #fff; }
  .act.go { border-color: rgba(16,185,129,.45); color: var(--grn); }
  .act.go:hover { background: rgba(16,185,129,.1); }
  .act.danger { border-color: rgba(244,63,94,.4); color: var(--red); }
  .act.danger:hover { background: rgba(244,63,94,.12); border-color: var(--red); color: #fff; }
  .empty { color: rgba(255,255,255,.45); font-size: 17px; padding: 60px 0; text-align: center; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px;
    background: #101a2e; border: 1px solid rgba(79,142,247,.4); font-size: 14px;
    opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 50; }
  .toast[data-on] { opacity: 1; }
  .toast[data-err] { border-color: rgba(244,63,94,.6); color: #ffb3c0; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Deck Manager</h1>
    <div class="sub" id="root-label">HTML presentations</div>
  </div>
  <button class="btn primary" id="new-deck">+ New deck</button>
</header>
<main>
  <div id="groups"></div>
  <div id="dropnew">⤵ Drop here to move into a <b>new folder</b>…</div>
  <div class="empty" id="empty" hidden>No presentations found in this folder yet.</div>
</main>
<div class="toast" id="toast"></div>

<script>
const groupsEl = document.getElementById('groups');
let allGroups = [];   // existing group folders, offered by the Move… prompt
const toastEl = document.getElementById('toast');
let toastTimer;

function toast(msg, err) {
  toastEl.textContent = msg;
  toastEl.toggleAttribute('data-err', !!err);
  toastEl.setAttribute('data-on', '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.removeAttribute('data-on'), 3200);
}

async function api(url, body) {
  const r = await fetch(url, body
    ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    : undefined);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}

function deckUrl(d) { return '/files/' + d.path.split('/').map(encodeURIComponent).join('/'); }
function presenterUrl(d) { return '/__dm/presenter.html?deck=' + encodeURIComponent(d.path); }
function slideshowUrl(d) { return deckUrl(d) + '?_dmshow=1#1'; }
function pdfUrl(d) { return '/api/pdf?path=' + encodeURIComponent(d.path); }

function fmtDate(ms) {
  return new Date(ms).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
}

function card(d) {
  const el = document.createElement('div');
  el.className = 'card';

  const thumb = document.createElement('div');
  thumb.className = 'thumb';
  const frame = document.createElement('iframe');
  // _snthumb makes deck-stage suppress its rail; loading=lazy keeps big
  // decks from all booting at once.
  frame.src = deckUrl(d) + '?_snthumb=1#1';
  frame.loading = 'lazy';
  frame.tabIndex = -1;
  thumb.append(frame, Object.assign(document.createElement('div'), { className: 'veil' }));
  const scale = () => { frame.style.transform = 'scale(' + (thumb.clientWidth / 1920) + ')'; };
  new ResizeObserver(scale).observe(thumb);
  thumb.addEventListener('click', () => { location.href = deckUrl(d); });

  const meta = document.createElement('div');
  meta.className = 'meta';
  const title = document.createElement('div');
  title.className = 'title';
  title.textContent = d.title;
  const info = document.createElement('div');
  info.className = 'info';
  info.textContent = (d.slides != null ? d.slides + ' slides · ' : '') + fmtDate(d.mtime);
  if (d.bundled || d.external) {
    const b = document.createElement('span');
    b.className = 'badge' + (d.external ? ' ext' : '');
    b.textContent = d.bundled ? 'BUNDLED' : 'EXTERNAL';
    b.title = d.external ? 'A self-contained deck with its own slide engine — open, present as a window, and manage it here; deep editing is deck-stage-only.' : '';
    info.appendChild(b);
  }
  meta.append(title, info);

  const actions = document.createElement('div');
  actions.className = 'actions';
  const mk = (label, cls, fn) => {
    const b = document.createElement('button');
    b.className = 'act' + (cls ? ' ' + cls : '');
    b.textContent = label;
    b.addEventListener('click', fn);
    actions.appendChild(b);
  };
  // Duplicate / Rename / Delete work on any deck (file/folder operations).
  const addManageButtons = () => {
    mk('Duplicate', '', async () => {
      const name = prompt('Name for the copy:', d.title + ' copy');
      if (!name) return;
      try { await api('/api/duplicate-deck', { path: d.path, name }); toast('Duplicated'); load(); }
      catch (e) { toast(e.message, true); }
    });
    mk('Rename', '', async () => {
      const name = prompt('New name:', d.title);
      if (!name || name === d.title) return;
      try { await api('/api/rename-deck', { path: d.path, name }); toast('Renamed'); load(); }
      catch (e) { toast(e.message, true); }
    });
    mk('Move…', '', async () => {
      const hint = allGroups.length ? '\nExisting folders: ' + allGroups.join(' · ') : '';
      const folder = prompt('Move to folder (leave empty for the top level).' + hint, d.group || '');
      if (folder === null || folder.trim() === (d.group || '')) return;
      try { await api('/api/move-deck', { path: d.path, folder: folder.trim() }); toast('Moved'); load(); }
      catch (e) { toast(e.message, true); }
    });
    // Hiding is library metadata only — the deck's files stay exactly where
    // they are. Real deletion lives in the Hidden section.
    mk('Hide', '', async () => {
      try { await api('/api/hide-deck', { path: d.path, hidden: true }); toast('Hidden — find it in the Hidden section below'); load(); }
      catch (e) { toast(e.message, true); }
    });
  };

  if (d.hidden) {
    // Hidden-section card: restore, or truly remove (to the recoverable trash).
    mk('Open', '', () => { location.href = deckUrl(d); });
    mk('Unhide', 'go', async () => {
      try { await api('/api/hide-deck', { path: d.path, hidden: false }); toast('Restored to the library'); load(); }
      catch (e) { toast(e.message, true); }
    });
    mk('Delete', 'danger', async () => {
      if (!confirm('Delete “' + d.title + '”?\n\nIt will be moved to the .deck-manager-trash folder next to your decks, so you can still recover it.')) return;
      try { await api('/api/delete-deck', { path: d.path }); toast('Moved to trash'); load(); }
      catch (e) { toast(e.message, true); }
    });
  } else if (d.bundled) {
    mk('View', '', () => { location.href = deckUrl(d); });
    mk('Import to edit', 'go', async () => {
      try {
        const r = await api('/api/unbundle', { path: d.path });
        toast('Imported → ' + r.path);
        load();
      } catch (e) { toast(e.message, true); }
    });
  } else if (d.external) {
    // Non-deck-stage deck: open / share as a window / export; no deck-stage editing.
    mk('Open', '', () => { location.href = deckUrl(d); });
    mk('Window', 'go', () => { window.open(deckUrl(d), 'dm-ext-' + d.path); });
    mk('PDF', '', () => { window.open(pdfUrl(d), '_blank'); });
    addManageButtons();
  } else {
    mk('Open', '', () => { location.href = deckUrl(d); });
    mk('Slideshow', 'go', () => { window.open(slideshowUrl(d), 'dm-slideshow-' + d.path); });
    mk('Present', 'go', () => { window.open(presenterUrl(d), '_blank'); });
    mk('PDF', '', () => { window.open(pdfUrl(d), '_blank'); });
    addManageButtons();
  }

  el.append(thumb, meta, actions);

  // Drag a card onto another section (or the new-folder / Hidden targets).
  if (!d.bundled && !d.hidden) {
    el.draggable = true;
    el.addEventListener('dragstart', (e) => {
      dragDeck = d;
      e.dataTransfer.setData('text/plain', d.path);
      e.dataTransfer.effectAllowed = 'move';
      el.classList.add('dragging');
      document.body.classList.add('dm-dragging');
    });
    el.addEventListener('dragend', () => {
      dragDeck = null;
      el.classList.remove('dragging');
      document.body.classList.remove('dm-dragging');
      document.querySelectorAll('.drop-hint').forEach((n) => n.classList.remove('drop-hint'));
    });
  }
  return el;
}

let dragDeck = null;

/** Make an element accept dragged deck cards; onDrop gets the dragged deck. */
function dropTarget(elm, onDrop) {
  elm.addEventListener('dragover', (e) => {
    if (!dragDeck) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    elm.classList.add('drop-hint');
  });
  elm.addEventListener('dragleave', () => elm.classList.remove('drop-hint'));
  elm.addEventListener('drop', (e) => {
    e.preventDefault();
    elm.classList.remove('drop-hint');
    if (dragDeck) onDrop(dragDeck);
  });
}

async function dropMove(d, folder) {
  if ((d.group || '') === folder) return;
  try { await api('/api/move-deck', { path: d.path, folder }); toast('Moved' + (folder ? ' to ' + folder : ' to top level')); load(); }
  catch (e) { toast(e.message, true); }
}

async function load() {
  try {
    const decks = await api('/api/decks');
    const visible = decks.filter((d) => !d.hidden);
    const hiddenDecks = decks.filter((d) => d.hidden);
    allGroups = [...new Set(visible.map((d) => d.group).filter(Boolean))].sort();
    // Section per group folder; top-level (ungrouped) decks come first. The
    // top-level section always exists so it's available as a drop target
    // (shown as a labeled strip while dragging).
    const byGroup = new Map([['', []]]);
    for (const d of visible) {
      const g = d.group || '';
      if (!byGroup.has(g)) byGroup.set(g, []);
      byGroup.get(g).push(d);
    }
    const keys = [...byGroup.keys()].sort((a, b) =>
      a === '' ? -1 : b === '' ? 1 : a.localeCompare(b));
    const frag = document.createDocumentFragment();
    for (const g of keys) {
      const wrap = document.createElement('div');
      wrap.className = 'grid';
      byGroup.get(g).forEach((d) => wrap.appendChild(card(d)));
      if (g) {
        const h = document.createElement('h2');
        h.className = 'ghead';
        h.textContent = g;
        dropTarget(h, (d) => dropMove(d, g));
        frag.appendChild(h);
      }
      dropTarget(wrap, (d) => dropMove(d, g));
      frag.appendChild(wrap);
    }

    // Hidden section — collapsed by default, remembered per browser. Cards
    // here offer Unhide / Delete; dropping a card on the header hides it.
    if (hiddenDecks.length) {
      const open = localStorage.getItem('dm.hiddenOpen') === '1';
      const h = document.createElement('h2');
      h.className = 'ghead hid-head';
      h.textContent = 'Hidden (' + hiddenDecks.length + ') ' + (open ? '▾' : '▸');
      h.title = 'Decks hidden from the library — files untouched. Click to expand; drop a card here to hide it.';
      const wrap = document.createElement('div');
      wrap.className = 'grid hid-grid';
      wrap.hidden = !open;
      hiddenDecks.forEach((d) => wrap.appendChild(card(d)));
      h.addEventListener('click', () => {
        wrap.hidden = !wrap.hidden;
        localStorage.setItem('dm.hiddenOpen', wrap.hidden ? '0' : '1');
        h.textContent = 'Hidden (' + hiddenDecks.length + ') ' + (wrap.hidden ? '▸' : '▾');
      });
      dropTarget(h, async (d) => {
        try { await api('/api/hide-deck', { path: d.path, hidden: true }); toast('Hidden'); load(); }
        catch (e) { toast(e.message, true); }
      });
      frag.append(h, wrap);
    }
    groupsEl.replaceChildren(frag);
    document.getElementById('empty').hidden = decks.length > 0;
  } catch (e) { toast(e.message, true); }
}

// Drop a card on the floating zone to file it into a brand-new folder.
dropTarget(document.getElementById('dropnew'), (d) => {
  const folder = prompt('Name for the new folder:');
  if (folder && folder.trim()) dropMove(d, folder.trim());
});

document.getElementById('new-deck').addEventListener('click', async () => {
  const name = prompt('Name for the new presentation:');
  if (!name) return;
  try {
    const r = await api('/api/new-deck', { name });
    toast('Created');
    location.href = '/files/' + r.path.split('/').map(encodeURIComponent).join('/');
  } catch (e) { toast(e.message, true); }
});

load();
</script>
</body>
</html>
